{% extends "base.html" %}

{% block title %}Reset Password — Snap2Cook{% endblock %}

{% block extra_css %}
<style>
    .reset-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f1712;
    }

    .reset-card {
        background: #1c2228;
        padding: 2rem;
        border-radius: 16px;
        width: 100%;
        max-width: 380px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .reset-title {
        text-align: center;
        color: white;
        margin-bottom: 1.5rem;
        font-size: 1.5rem;
    }

    .reset-input {
        width: 100%;
        padding: 0.7rem;
        margin-bottom: 1rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: #121a13;
        color: white;
    }

    .reset-btn {
        width: 100%;
        padding: 0.75rem;
        background: #4caf78;
        border: none;
        border-radius: 8px;
        color: black;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    .reset-btn:hover {
        background: #5dc98a;
    }
</style>
{% endblock %}

{% block body %}

<div class="reset-container">
    <div class="reset-card">

        <h2 class="reset-title">Reset Password</h2>

        <form method="POST">

            <input type="password" name="password" class="reset-input" placeholder="New Password" required>

            <input type="password" name="confirm" class="reset-input" placeholder="Confirm Password" required>

            <button type="submit" class="reset-btn">
                Reset Password
            </button>

        </form>

    </div>
</div>

{% endblock %}
